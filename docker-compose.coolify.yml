services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ffxiv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ffxiv}
      POSTGRES_DB: ${POSTGRES_DB:-ffxiv}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ffxiv} -d ${POSTGRES_DB:-ffxiv}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      NODE_ENV: production
      API_PORT: 3001
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-ffxiv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ffxiv}
      POSTGRES_DB: ${POSTGRES_DB:-ffxiv}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
      SCHEMA_SYNC: ${SCHEMA_SYNC:-true}
      SEED_DEMO_GUIDES: ${SEED_DEMO_GUIDES:-true}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
    expose:
      - "3001"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        API_URL: http://api:3001
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    environment:
      NODE_ENV: production
      API_URL: http://api:3001
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    expose:
      - "3000"
    depends_on:
      - api

  admin:
    build:
      context: .
      dockerfile: docker/admin.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    expose:
      - "3002"
    depends_on:
      - api

  scraper:
    build:
      context: .
      dockerfile: docker/scraper.Dockerfile
    environment:
      API_BASE_URL: http://api:3001
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
      REDIS_URL: redis://redis:6379
      SCRAPER_ENABLED: ${SCRAPER_ENABLED:-true}
      SCRAPER_POLL_INTERVAL_MS: ${SCRAPER_POLL_INTERVAL_MS:-2000}
      SCRAPER_MAX_ATTEMPTS: ${SCRAPER_MAX_ATTEMPTS:-3}
      SCRAPER_RETRY_BACKOFF_MS: ${SCRAPER_RETRY_BACKOFF_MS:-3000}
      SCRAPER_WORKER_CONCURRENCY: ${SCRAPER_WORKER_CONCURRENCY:-2}
      SCRAPER_FETCH_TIMEOUT_MS: ${SCRAPER_FETCH_TIMEOUT_MS:-15000}
      SCRAPER_FETCH_MAX_RETRIES: ${SCRAPER_FETCH_MAX_RETRIES:-2}
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy

volumes:
  postgres_data: {}
  redis_data: {}
