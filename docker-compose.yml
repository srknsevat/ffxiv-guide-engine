services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ffxiv
      POSTGRES_PASSWORD: ffxiv
      POSTGRES_DB: ffxiv
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ffxiv -d ffxiv"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      NODE_ENV: production
      API_PORT: 3001
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ffxiv
      POSTGRES_PASSWORD: ffxiv
      POSTGRES_DB: ffxiv
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-dev-internal-token}
      SCHEMA_SYNC: "true"
      SEED_DEMO_GUIDES: ${SEED_DEMO_GUIDES:-true}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    environment:
      NODE_ENV: production
      API_URL: http://api:3001
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3100}
    ports:
      - "3100:3000"
    depends_on:
      - api

  admin:
    build:
      context: .
      dockerfile: docker/admin.Dockerfile
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3002:3002"
    depends_on:
      - api

  scraper:
    build:
      context: .
      dockerfile: docker/scraper.Dockerfile
    environment:
      API_BASE_URL: http://api:3001
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-dev-internal-token}
      REDIS_URL: redis://redis:6379
      SCRAPER_ENABLED: ${SCRAPER_ENABLED:-true}
      SCRAPER_POLL_INTERVAL_MS: "2000"
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy

volumes:
  postgres_data: {}
